<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Pesanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            background: linear-gradient(to bottom right, #ff7779, #ffe771);
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 700px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 32px;
            border-radius: 16px;
            margin-top: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        ul#orderList {
            padding-left: 20px;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger px-5">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="logo.png" alt="Nongkrong Barengs" height="60" class="me-2">
        </a>
        <button class="btn btn-warning ms-auto" onclick="window.location.href='index.html'">Kembali</button>
    </nav>


    <!-- Form Checkout -->
    <div class="container mt-5 mb-5">
        <h2 class="mb-4 text-center">Checkout Pesanan</h2>
        <form id="checkoutForm">
            <div class="mb-3">
                <label class="form-label">Nama</label>
                <input type="text" class="form-control" name="nama" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nomor Telepon</label>
                <input type="text" class="form-control" name="telepon" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Alamat</label>
                <textarea class="form-control" name="alamat" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Catatan / Ancer-ancer</label>
                <textarea class="form-control" name="catatan"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Bukti Pembayaran</label><br>
                <button type="button" class="btn btn-secondary" onclick="uploadBukti()">Upload Bukti</button>
                <input type="hidden" name="bukti" id="bukti">
                <p id="fileLink" class="mt-2 text-success"></p>
            </div>

            <h4 class="mt-4">Pesanan Anda:</h4>
            <ul id="orderList"></ul>
            <p><strong>Total: Rp <span id="orderTotal">0</span></strong></p>

            <button type="submit" class="btn btn-success w-100">Buat Pesanan</button>
        </form>
    </div>

    <!-- Script -->
    <script>
        emailjs.init("S1MbQkcEqbJdU6SQI"); // ID user EmailJS

        const filestackClient = filestack.init('A81l67KiiT02a9dazOMyNz');

        function uploadBukti() {
            filestackClient.picker({
                onUploadDone: (res) => {
                    const fileUrl = res.filesUploaded[0].url;
                    document.getElementById('bukti').value = fileUrl;
                    document.getElementById('fileLink').textContent = "Bukti terupload.";
                }
            }).open();
        }

        // Load cart dari localStorage
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = 0;
        const orderList = document.getElementById('orderList');

        cart.forEach(({ item, price }) => {
            total += price;
            const li = document.createElement('li');
            li.textContent = `${item} - Rp ${price}`;
            orderList.appendChild(li);
        });
        document.getElementById('orderTotal').textContent = total;

        // Submit form EmailJS
        document.getElementById('checkoutForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = {
                nama: formData.get('nama'),
                telepon: formData.get('telepon'),
                alamat: formData.get('alamat'),
                catatan: formData.get('catatan') || '-',
                bukti: formData.get('bukti') || 'Belum diupload',
                pesanan: cart.map(({ item, price }) => `${item} - Rp ${price}`).join(', '),
                total: `Rp ${total}`
            };

            emailjs.send("service_yj0yonk", "template_qlgtsob", data)
                .then(() => {
                    alert("✅ Pesanan berhasil dikirim!");
                    localStorage.removeItem('cart');
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    alert("❌ Terjadi kesalahan saat mengirim pesanan.");
                    console.error("EmailJS Error:", error);
                });
        });

        // Autentikasi
        document.addEventListener("DOMContentLoaded", () => {
            const userName = localStorage.getItem("userName");
            if (!userName || userName.toLowerCase() !== "agusgemoy") {
                localStorage.setItem("invalidUserAlert", "true");
                window.location.href = "index.html";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
