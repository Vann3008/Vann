<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(to bottom right, #ff7779, #ffe771);
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .product-detail-card {
            max-width: 700px;
            margin: 50px auto;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
        }

        .product-detail-card img {
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn-back {
            margin-top: 24px;
        }
    </style>
</head>

<body>
    <!-- Navbar/Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.png" alt="Nongkrong Barengs" height="60" class="me-2">
            </a>
            <button class="btn btn-warning ms-auto" onclick="viewCart()">Keranjang</button>
        </div>
    </nav>

    <!-- Detail Produk -->
    <div class="container">
        <div class="product-detail-card text-center">
            <h2><strong>Ayam Geprek</strong></h2>
            <img src="https://asset.kompas.com/crops/lvOnuqWlDm2J6yGMueGUDXcGHdM=/135x0:980x563/1200x800/data/photo/2021/02/23/6034de156196c.jpg"
                class="img-fluid" alt="Ayam Geprek">
            <p class="mt-3">Ayam goreng tepung dengan sambal pedas yang menggugah selera.</p>
            <p><strong>Harga:</strong> Rp 10.000</p>
            <div class="d-flex justify-content-center gap-2">
                <a href="index.html" class="btn btn-outline-secondary">← Kembali</a>
                <button class="btn btn-danger" onclick="addToCart('Ayam Geprek', 10000)">+ Keranjang</button>
            </div>
        </div>
    </div>

    <!-- Cart Modal (optional reuse from index.html) -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Keranjang Belanja</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                <div class="modal-body" id="cartItems"></div>
                <div class="modal-footer d-flex justify-content-between align-items-center">
                    <strong>Total: Rp <span id="cartTotal">0</span></strong>
                    <a href="checkout.html" class="btn btn-success">Checkout</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const cart = JSON.parse(localStorage.getItem("cart")) || [];

        function addToCart(item, price) {
            cart.push({ item, price });
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${item} ditambahkan ke keranjang.`);
        }

        function viewCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            cartItems.innerHTML = '';
            let total = 0;
            cart.forEach(({ item, price }, index) => {
                total += price;
                const div = document.createElement('div');
                div.textContent = `${index + 1}. ${item} - Rp ${price}`;
                cartItems.appendChild(div);
            });
            cartTotal.textContent = total;
            new bootstrap.Modal(document.getElementById('cartModal')).show();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
